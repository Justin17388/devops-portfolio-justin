apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: prod

resources:
  - ../../base
  - namespace.yaml

namePrefix: prod-

patches:
  - target:
      kind: Deployment
      name: flask-hello
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: flask-hello
      spec:
        replicas: 3
